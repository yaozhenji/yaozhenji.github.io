<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Pages</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:"Microsoft YaHei",sans-serif;
            background:#f5f7fa;
            color:#333;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .container{
            background:#fff;
            padding:40px 60px;
            border-radius:16px;
            box-shadow:0 8px 30px rgba(0,0,0,.08);
            text-align:center;
            max-width:500px;
            width:100%;
        }
        h1{
            font-size:28px;
            color:#222;
            margin-bottom:16px;
        }
        p{
            color:#666;
            line-height:1.8;
            margin-bottom:24px;
        }
        .btn{
            display:inline-block;
            padding:12px 30px;
            background:#2563eb;
            color:#fff;
            text-decoration:none;
            border-radius:8px;
            transition:all .3s;
        }
        .btn:hover{
            background:#1d4ed8;
        }
        footer{
            margin-top:30px;
            font-size:14px;
            color:#999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到我的 GitHub Pages</h1>
        <p>这是一键生成的最终版静态主页<br>部署完成即可直接在线访问</p>
        <a href="https://github.com" target="_blank" class="btn">前往 GitHub</a>
    </div>
    <footer>Powered by GitHub Pages</footer>
</body>
</html>
